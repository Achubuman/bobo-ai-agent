<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波波 ｜ 我要點餐</title>
<style>
  :root{--bg:#faf7f2;--card:#fff;--ink:#231F2B;--muted:#6e665c;--brand:#E8674C;--brand-d:#cf4f37;--line:#ece5db;--good:#2e9e6b;--chip:#f3ede4}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang TC","Noto Sans TC",Segoe UI,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:560px;margin:0 auto;padding:16px 14px 96px;overflow-x:clip}
  h2{font-size:16px;margin:0 0 4px}
  .sub{font-size:12.5px;color:var(--muted);margin:0 0 12px}
  .who{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 12px;margin-bottom:12px}
  .who label{font-size:12.5px;color:var(--muted)}
  .who input{flex:1;border:0;font-size:14px;font-family:inherit;color:var(--ink);background:none;outline:none;min-width:0}
  .cattabs{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;position:sticky;top:0;background:var(--bg);z-index:6}
  .cattabs::-webkit-scrollbar{height:0}
  .cattab{flex:none;border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 13px;font-size:12.5px;cursor:pointer;color:var(--muted);white-space:nowrap}
  .cattab.on{background:var(--brand);color:#fff;border-color:var(--brand);font-weight:700}
  .cat-h{font-size:12px;font-weight:700;color:var(--brand-d);margin:12px 0 4px;border-bottom:1px solid var(--line);padding-bottom:3px}
  .it{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:8px;cursor:pointer}
  .it:hover{border-color:var(--brand)}
  .it.on{border-color:var(--brand);box-shadow:0 0 0 2px rgba(232,103,76,.14)}
  .it .nm{font-weight:600;font-size:14px;flex:1;min-width:0;overflow-wrap:anywhere}
  .it .pr{font-weight:700;color:var(--brand);white-space:nowrap}
  .opts{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:4px 0 10px}
  .opts .k{font-size:12.5px;color:var(--muted);margin:8px 0 5px;font-weight:600}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 13px;font-size:12.5px;cursor:pointer;color:var(--ink)}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand);font-weight:700}
  .qty{display:flex;align-items:center;gap:12px;margin-top:4px}
  .qty button{width:32px;height:32px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:17px;cursor:pointer;color:var(--ink)}
  .qty span{font-size:15px;font-weight:700;min-width:22px;text-align:center}
  .bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);box-shadow:0 -3px 14px rgba(60,40,30,.1);padding:10px 14px 16px;z-index:50}
  .bar .go{display:block;width:100%;max-width:560px;margin:0 auto;padding:14px;border:0;border-radius:12px;background:var(--brand);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
  .bar .go:disabled{background:#d9cfc2;cursor:default}
  .done{text-align:center;padding:40px 16px;color:var(--good)}
  .done .big{font-size:40px}
  .done h2{color:var(--ink);margin-top:10px}
  .done .od{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin:14px auto 0;max-width:360px;text-align:left;font-size:14px}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <h2>選一杯，幫你送進這團</h2>
  <p class="sub" id="shopname">金茶伍 · 截單 15:00</p>
  <div class="who"><label>你的名字</label><input id="who" value="阿Ken" autocomplete="off"></div>
  <div id="cattabs" class="cattabs"></div>
  <div id="menu"></div>
</div>
<div class="bar"><button id="go" class="go" disabled>請先選一杯</button></div>

<script>
var $=function(s){return document.querySelector(s);};
var MENU=[], SHOP='本團', sel=null, opt={甜度:'半糖',冰量:'少冰',加料:[]}, qty=1;
var SUGAR=['正常糖','少糖','半糖','微糖','無糖'], ICE=['正常冰','少冰','微冰','去冰','熱'], ADD=[['珍珠',10],['椰果',10],['布丁',10]];

function loadMenu(){
  try{
    var raw=localStorage.getItem('bobo_open_team_menu');
    if(raw){ var d=JSON.parse(raw); MENU=d.items||[]; SHOP=d.shop||'本團'; }
  }catch(_){}
  if(!MENU.length){ MENU=[{name:'招牌紅茶',price:35,category:'純茶'},{name:'珍珠奶茶',price:55,category:'奶茶'},{name:'四季春茶',price:35,category:'純茶'}]; }
  $('#shopname').textContent=SHOP+' · 截單 15:00';
  render();
}
function render(){
  var groups={}; MENU.forEach(function(m,i){ var c=m.category||'飲料'; (groups[c]=groups[c]||[]).push(i); });
  var cats=Object.keys(groups);
  var tb=''; if(cats.length>=3){ tb='<button class="cattab on" data-cat="__all">全部</button>'; cats.forEach(function(c){ tb+='<button class="cattab" data-cat="'+esc(c)+'">'+esc(c)+'</button>'; }); }
  $('#cattabs').innerHTML=tb;
  var h='';
  cats.forEach(function(c){
    h+='<div class="catblock" data-cat="'+esc(c)+'">';
    if(cats.length>=3) h+='<div class="cat-h">'+esc(c)+'</div>';
    groups[c].forEach(function(i){ var m=MENU[i];
      h+='<div class="it" data-i="'+i+'"><span class="nm">'+esc(m.name)+'</span><span class="pr">$'+m.price+'</span></div>';
      if(sel===i) h+=optsHtml();
    });
    h+='</div>';
  });
  $('#menu').innerHTML=h;
  updateGo();
}
function optsHtml(){
  var h='<div class="opts"><div class="k">甜度</div><div class="chips">';
  SUGAR.forEach(function(s){ h+='<span class="chip '+(opt.甜度===s?'on':'')+'" data-sugar="'+s+'">'+s+'</span>'; });
  h+='</div><div class="k">冰量</div><div class="chips">';
  ICE.forEach(function(s){ h+='<span class="chip '+(opt.冰量===s?'on':'')+'" data-ice="'+s+'">'+s+'</span>'; });
  h+='</div><div class="k">加料（可複選）</div><div class="chips">';
  ADD.forEach(function(a){ h+='<span class="chip '+(opt.加料.indexOf(a[0])>=0?'on':'')+'" data-add="'+a[0]+'">'+a[0]+' +'+a[1]+'</span>'; });
  h+='</div><div class="k">數量</div><div class="qty"><button data-q="-1">−</button><span>'+qty+'</span><button data-q="1">＋</button></div></div>';
  return h;
}
function price(){ if(sel==null)return 0; var p=MENU[sel].price; opt.加料.forEach(function(n){ var a=ADD.filter(function(x){return x[0]===n;})[0]; if(a)p+=a[1]; }); return p*qty; }
function updateGo(){ var g=$('#go'); if(sel==null){ g.disabled=true; g.textContent='請先選一杯'; } else { g.disabled=false; g.textContent='✓ 送出我的訂單  $'+price(); } }

$('#cattabs').addEventListener('click',function(e){ var b=e.target.closest('.cattab'); if(!b)return; var cat=b.dataset.cat;
  $('#cattabs').querySelectorAll('.cattab').forEach(function(x){x.classList.toggle('on',x===b);});
  $('#menu').querySelectorAll('.catblock').forEach(function(bl){ bl.style.display=(cat==='__all'||bl.dataset.cat===cat)?'':'none'; });
});
$('#menu').addEventListener('click',function(e){
  var it=e.target.closest('.it');
  if(it){ var i=+it.dataset.i; sel=(sel===i?null:i); opt={甜度:'半糖',冰量:'少冰',加料:[]}; qty=1; render(); var n=$('#menu').querySelector('.it[data-i="'+i+'"]'); if(n&&sel===i)n.classList.add('on'); return; }
  var c=e.target.closest('.chip');
  if(c){
    if(c.dataset.sugar){ opt.甜度=c.dataset.sugar; }
    else if(c.dataset.ice){ opt.冰量=c.dataset.ice; }
    else if(c.dataset.add){ var n=c.dataset.add, k=opt.加料.indexOf(n); if(k>=0)opt.加料.splice(k,1); else opt.加料.push(n); }
    render(); var s=$('#menu').querySelector('.it[data-i="'+sel+'"]'); if(s)s.classList.add('on'); return;
  }
  var q=e.target.closest('[data-q]');
  if(q){ qty=Math.max(1,qty+(+q.dataset.q)); render(); var s2=$('#menu').querySelector('.it[data-i="'+sel+'"]'); if(s2)s2.classList.add('on'); }
});
$('#go').addEventListener('click',function(){
  if(sel==null)return;
  var who=($('#who').value||'我').trim();
  var spec=opt.甜度+'/'+opt.冰量+(opt.加料.length?'/加'+opt.加料.join('、'):'')+(qty>1?(' ×'+qty):'');
  var item=MENU[sel].name, total=price();
  if(window.parent && window.parent!==window){
    window.parent.postMessage({type:'bobo_order_placed', person:who, item:item, spec:spec, price:total},'*');
  }
  $('#wrap').innerHTML='<div class="done"><div class="big">✅</div><h2>'+esc(who)+'，訂單已送出！</h2>'
    +'<div class="od"><b>'+esc(item)+'</b>　$'+total+'<br><span style="color:var(--muted);font-size:13px">'+esc(spec)+'</span></div>'
    +'<p class="sub" style="margin-top:14px">截單前都能改單，缺貨時波波會通知你。</p></div>';
  $('#go').style.display='none';
});
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
loadMenu();
</script>
</body>
</html>
